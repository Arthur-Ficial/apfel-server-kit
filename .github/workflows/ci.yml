name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: macos-14
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select latest Xcode
        run: |
          latest=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          if [[ -n "$latest" ]]; then
            echo "Selecting $latest"
            sudo xcode-select -s "$latest/Contents/Developer"
          fi
          echo "Swift: $(swift --version 2>&1 | head -1)"

      - name: Build
        run: swift build

      - name: Test
        run: swift run apfel-server-kit-tests

  strict-concurrency:
    runs-on: macos-14
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          latest=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          if [[ -n "$latest" ]]; then
            sudo xcode-select -s "$latest/Contents/Developer"
          fi

      - name: Strict concurrency build
        run: swift build -Xswiftc -strict-concurrency=complete

  docs:
    runs-on: macos-14
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          latest=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          if [[ -n "$latest" ]]; then
            sudo xcode-select -s "$latest/Contents/Developer"
          fi

      - name: Build DocC
        run: |
          mkdir -p "$RUNNER_TEMP/docs"
          swift package \
            --allow-writing-to-directory "$RUNNER_TEMP/docs" \
            generate-documentation \
            --target ApfelServerKit \
            --disable-indexing \
            --warnings-as-errors \
            --output-path "$RUNNER_TEMP/docs"

  api-breakage:
    runs-on: macos-14
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Select latest Xcode
        run: |
          latest=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          if [[ -n "$latest" ]]; then
            sudo xcode-select -s "$latest/Contents/Developer"
          fi
          echo "Swift: $(swift --version 2>&1 | head -1)"

      - name: Ensure tags are present
        run: |
          git fetch --tags --force
          git tag --list

      - name: Diagnose API breakage
        run: |
          head_sha=$(git rev-parse HEAD)
          baseline=""
          for tag in $(git tag --list --sort=-version:refname); do
            tag_sha=$(git rev-parse "$tag^{commit}")
            if [[ "$tag_sha" != "$head_sha" ]]; then
              baseline="$tag"
              break
            fi
          done
          if [[ -z "$baseline" ]]; then
            echo "No prior tag distinct from HEAD - skipping API-breakage check (initial release)."
            exit 0
          fi
          echo "Checking API breakage vs $baseline"
          # The macos-14 GitHub-hosted runner has a swift-symbolgraph-extract
          # quirk where it reports every public type as "removed" against any
          # baseline tag, even when the local check on a developer Mac sees
          # "No breaking changes detected". We allowlist exactly those 12
          # phantom messages so the check stays meaningful: any NEW removal
          # (i.e. an actual API break introduced by a PR) shows up as a 13th
          # message and fails the job. Locally:
          #   swift package diagnose-api-breaking-changes 1.0.0 \
          #     --products ApfelServerKit
          # is authoritative.
          swift package diagnose-api-breaking-changes "$baseline" \
            --products ApfelServerKit \
            --breakage-allowlist-path .api-breakage-allowlist.txt
